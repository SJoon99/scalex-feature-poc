apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rgw-analysis-web.fullname" . }}-result-web
  labels:
{{ include "rgw-analysis-web.componentLabels" (dict "root" . "component" "result-web") | indent 4 }}
spec:
  replicas: {{ .Values.resultWeb.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "rgw-analysis-web.name" . }}
      scalex.io/release: {{ .Values.releaseLabel | quote }}
      scalex.io/component: "result-web"
  template:
    metadata:
      labels:
{{ include "rgw-analysis-web.componentLabels" (dict "root" . "component" "result-web") | indent 8 }}
    spec:
      serviceAccountName: {{ include "rgw-analysis-web.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: result-sync
          image: {{ include "rgw-analysis-web.image" .Values.images.awsCli | quote }}
          imagePullPolicy: {{ .Values.images.awsCli.pullPolicy }}
          command: ["/bin/sh", "/scripts/result-sync.sh"]
          env:
{{ include "rgw-analysis-web.awsEnv" . | indent 12 }}
            - name: S3_RESULT_PREFIX
              value: {{ .Values.s3.resultPrefix | quote }}
            - name: S3_SYNC_INTERVAL_SECONDS
              value: {{ .Values.s3.syncIntervalSeconds | quote }}
            - name: HTML_DIR
              value: /usr/share/nginx/html
          securityContext:
{{ toYaml .Values.awsCliSecurityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources.resultSync | indent 12 }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: html
              mountPath: /usr/share/nginx/html
            - name: tmp
              mountPath: /tmp
        - name: nginx
          image: {{ include "rgw-analysis-web.image" .Values.images.nginx | quote }}
          imagePullPolicy: {{ .Values.images.nginx.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.resultWeb.service.targetPort }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
{{ toYaml .Values.nginxSecurityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources.nginx | indent 12 }}
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scripts
          configMap:
            name: {{ include "rgw-analysis-web.fullname" . }}-scripts
            defaultMode: 0555
        - name: nginx-config
          configMap:
            name: {{ include "rgw-analysis-web.fullname" . }}-nginx
        - name: html
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{ include "rgw-analysis-web.nodeScheduling" . | indent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rgw-analysis-web.fullname" . }}-result-web
  annotations:
{{- if .Values.resultWeb.service.annotations }}
{{ toYaml .Values.resultWeb.service.annotations | indent 4 }}
{{- else }}
    scalex.io/exposure: internal
{{- end }}
  labels:
{{ include "rgw-analysis-web.componentLabels" (dict "root" . "component" "result-web") | indent 4 }}
spec:
  type: {{ .Values.resultWeb.service.type }}
  ports:
    - name: http
      port: {{ .Values.resultWeb.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: {{ include "rgw-analysis-web.name" . }}
    scalex.io/release: {{ .Values.releaseLabel | quote }}
    scalex.io/component: "result-web"
