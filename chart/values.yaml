nameOverride: ""
fullnameOverride: ""

releaseLabel: rgw-analysis-web

objectStorage:
  claim:
    enabled: false
    name: rgw-analysis-web-bucket
    bucketName: ""
    generateBucketName: ""
    storageClassName: object-bucket

s3:
  endpointUrl: "https://s3.example.invalid"
  bucket: "rgw-analysis-poc"
  region: "us-east-1"
  secretName: "rgw-analysis-web-s3"
  inputKey: "input/dataset.csv"
  resultPrefix: "results/rgw-analysis-web"
  resultJsonKey: "results/rgw-analysis-web/result.json"
  resultIndexKey: "results/rgw-analysis-web/index.html"
  waitSeconds: 120
  pollIntervalSeconds: 5
  syncIntervalSeconds: 30

images:
  awsCli:
    repository: public.ecr.aws/aws-cli/aws-cli
    tag: "2.17.57"
    digest: sha256:603e86d34bbbba57bb1dfe1cc2ac5ef6eef0df1e0d0b953ee9b83a0f6cac3d59
    pullPolicy: IfNotPresent
  nginx:
    repository: nginx
    tag: "1.27.3-alpine"
    digest: sha256:814a8e88df978ade80e584cc5b333144b9372a8e3c98872d07137dbf3b44d0e4
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

awsCliSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nginxSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  datasetSeeder:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  analyzer:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  resultSync:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  nginx:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

jobs:
  datasetSeeder:
    backoffLimit: 2
    ttlSecondsAfterFinished: null
  analyzer:
    backoffLimit: 2
    ttlSecondsAfterFinished: null

resultWeb:
  replicas: 1
  service:
    type: ClusterIP
    annotations:
      scalex.io/exposure: internal
    port: 80
    targetPort: 8080

nodeSelector: {}
tolerations: []
affinity: {}
